<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Tailwind CSS Exercises</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body>
        <div class="p-4">
            <!-- Primary Button -->
            <button class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-400
                            transition-colors duration-300 focus:ring-2">
                Primary
            </button>
            <!-- Secondary Button -->
            <button class="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-400
                            transition-colors duration-300 focus:ring-2">
                Secondary
            </button>
            <!-- Outline Button -->
            <button class="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-400
                            transition-colors duration-300 focus:ring-2">
                Outline
            </button>

        </div>
    </body>
</html>
